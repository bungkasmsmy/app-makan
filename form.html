<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      --card-bg: rgba(30, 41, 59, 0.7);
      --border-color: rgba(255, 255, 255, 0.1);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --accent-color: #6366f1;
      --accent-gradient: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
      --accent-glow: rgba(99, 102, 241, 0.4);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg-gradient);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem 1rem;
      overflow-x: hidden;
      position: relative;
    }

    /* Background blob decorations for a depth effect */
    .bg-blob {
      position: absolute;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
      border-radius: 50%;
      filter: blur(40px);
      z-index: 0;
      pointer-events: none;
    }

    .blob-1 {
      top: 10%;
      left: 15%;
    }

    .blob-2 {
      bottom: 15%;
      right: 10%;
      background: radial-gradient(circle, rgba(168, 85, 247, 0.3) 0%, transparent 70%);
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
    }

    .contact-card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 2.5rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .contact-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4), 0 0 30px rgba(99, 102, 241, 0.15);
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      background: linear-gradient(to right, #ffffff, #c7d2fe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-align: center;
    }

    .subtitle {
      color: var(--text-secondary);
      text-align: center;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
      position: relative;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
      transition: color 0.3s ease;
    }

    input, textarea {
      width: 100%;
      padding: 0.85rem 1rem;
      background: rgba(15, 23, 42, 0.6);
      border: 1.5px solid var(--border-color);
      border-radius: 10px;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 1rem;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      outline: none;
    }

    input:focus, textarea:focus {
      border-color: var(--accent-color);
      background: rgba(15, 23, 42, 0.85);
      box-shadow: 0 0 0 4px var(--accent-glow);
    }

    input:focus + label, textarea:focus + label {
      color: var(--accent-color);
    }

    textarea {
      resize: vertical;
      min-height: 120px;
    }

    button {
      width: 100%;
      padding: 1rem;
      background: var(--accent-gradient);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
      position: relative;
      overflow: hidden;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5);
    }

    button:active {
      transform: translateY(1px);
    }

    /* Loading Spinner Styles */
    .btn-text {
      transition: opacity 0.2s ease;
      display: inline-block;
    }
    button.loading .btn-text {
      opacity: 0;
    }
    .btn-loader {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.8s linear infinite;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }
    button.loading .btn-loader {
      opacity: 1;
    }

    @keyframes spin {
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    #msg {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.95rem;
      font-weight: 500;
      min-height: 24px;
      transition: all 0.3s ease;
      opacity: 0;
      color: #10b981; /* Default success green */
    }

    #msg.show {
      opacity: 1;
      animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>

  <div class="container">
    <div class="contact-card">
      <h1>Contact us</h1>
      <p class="subtitle">Drop us a line and we'll get back to you as soon as possible.</p>
      
      <form id="contact-form">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="John Doe" required>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="john@example.com" required>
        </div>

        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" placeholder="Your message here..." required></textarea>
        </div>

        <button type="submit" id="submit-btn">
          <span class="btn-text">Send Message</span>
          <div class="btn-loader"></div>
        </button>
      </form>

      <p id="msg"></p>
    </div>
  </div>

  <script>
    const URL = "https://script.google.com/macros/s/AKfycbymEcIvGIFWeJA_aVoVPWn8h5LWJrVKIl2GEvppxhZiTaR_3PzpZfNtDqhHzmrD7imi/exec";

    const form = document.getElementById('contact-form');
    const msg = document.getElementById('msg');
    const submitBtn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      // Setup state before sending
      submitBtn.classList.add('loading');
      submitBtn.disabled = true;
      msg.classList.remove('show');
      msg.innerText = '';
      msg.style.color = '#10b981'; // reset to success green

      const formData = new FormData(form);
      const data = {
        name: formData.get('name'),
        email: formData.get('email'),
        message: formData.get('message')
      };

      try {
        await fetch(URL, {
          method: "POST",
          mode: "no-cors",
          body: JSON.stringify(data)
        });

        // Show thank you and reset form
        msg.innerText = "Thanks! We'll get back to you.";
        msg.classList.add('show');
        form.reset();
      } catch (error) {
        console.error('Submission failed:', error);
        msg.innerText = "Submission failed. Please try again.";
        msg.style.color = "#ef4444"; // Error red
        msg.classList.add('show');
      } finally {
        submitBtn.classList.remove('loading');
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
